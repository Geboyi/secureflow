name: DevSecOps Pipeline

on:
  push:
  pull_request:

jobs:

  # ---------------------------
  # STAGE 1 — SECRETS (HARD FAIL)
  # ---------------------------
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --log-opts="--all"


  # ---------------------------
  # STAGE 2 — CODE ANALYSIS (SOFT FAIL)
  # ---------------------------
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: gitleaks
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ---------------------------
  # STAGE 3 — CONTAINER SCAN (HARD FAIL)
  # ---------------------------
  trivy-images:
  name: Trivy Image Scan
  runs-on: ubuntu-latest
  needs: gitleaks
  if: always()

  steps:
    - uses: actions/checkout@v4

    - name: Build images
      run: |
        docker build -t secureflow/auth-service:v1 ./services/auth-service
        docker build -t secureflow/frontend:v1 ./services/frontend
        docker build -t secureflow/transaction-service:v1 ./services/transaction-service

    - name: Scan auth-service image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'secureflow/auth-service:v1'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'secureflow/frontend:v1'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Scan transaction-service image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'secureflow/transaction-service:v1'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

  trivy-k8s:
    name: Trivy Kubernetes Scan
    runs-on: ubuntu-latest
    needs: gitleaks
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: './infra/kubernetes/base'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: gitleaks
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./infra/terraform
          framework: terraform
          output_format: cli
          quiet: false
          soft_fail: false

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy-images, trivy-k8s, checkov, sonar]

    steps:
      - name: Evaluate pipeline status
        run: |
          echo "Evaluating security findings..."

          if [ "${{ needs.gitleaks.result }}" != "success" ]; then
            echo " Gitleaks failed — blocking merge"
            exit 1
          fi

          if [ "${{ needs.trivy-images.result }}" != "success" ]; then
            echo " Trivy image scan failed — blocking merge"
            exit 1
          fi

          if [ "${{ needs.trivy-k8s.result }}" != "success" ]; then
            echo " Trivy K8s scan failed — blocking merge"
            exit 1
          fi

          if [ "${{ needs.checkov.result }}" != "success" ]; then
            echo " Checkov failed — blocking merge"
            exit 1
          fi

          echo " Sonar findings do NOT block merge"

          echo " Security gate passed"


      - name: Post PR Comment
        if: always()
        run: |
          echo "### Security Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### DevSecOps Findings (Blocking)" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: ${{ needs.gitleaks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: ${{ needs.trivy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Checkov: ${{ needs.checkov.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### AppSec Findings (Non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo "- SonarCloud: Review dashboard" >> $GITHUB_STEP_SUMMARY