apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: secureflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              svc: auth-service
      ports:
        - protocol: TCP
          port: 5001
    - to:
        - podSelector:
            matchLabels:
              svc: transaction-service
      ports:
        - protocol: TCP
          port: 5002
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-ingress
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              svc: frontend
        - podSelector:
            matchLabels:
              svc: transaction-service
      ports:
        - protocol: TCP
          port: 5001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-transaction-service-ingress
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: transaction-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              svc: frontend
      ports:
        - protocol: TCP
          port: 5002
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-to-auth-db
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: auth-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              svc: auth-db
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-transaction-service-to-transaction-db
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: transaction-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              svc: transaction-db
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-db-ingress
  namespace: secureflow
spec:
  podSelector:
    matchLabels:
      svc: auth-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              svc: auth-service
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
