apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
  # CK-07 — missing required labels remediated
  labels:
    app: auth-service
    team: devsecops
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: auth-service
  template:
    metadata:
      labels:
        svc: auth-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-role"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/auth-service"
    spec:
      serviceAccountName: auth-sa
      containers:
        - name: auth-service
          # CK-06 — :latest tag - remediated
          image: secureflow/auth-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          # envFrom:
          #   - configMapRef:
          #       name: secureflow-config
          env:
            - name: DB_HOST
              value: auth-db
            - name: DB_NAME
              value: authdb
            - name: DB_USER
              value: authuser
          
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          # CK-05 — no resources remediated.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: secureflow
spec:
  selector:
    svc: auth-service
  ports:
    - port: 5001
      targetPort: 5001
